name: Deployment
on:
  workflow_dispatch:
    inputs:
      config_file:
        description: "File to deploy"
        type: choice
        options: [main.json]
        required: true

env:
  BUCKET_NAME: bucket-rene-testing

jobs:
  preview:
    runs-on: ubuntu-latest
    outputs:
      config-hash: ${{ steps.preview.outputs.config-hash }}
      has-current: ${{ steps.preview.outputs.has-current }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          version: latest
      - run: bun install && bun link

      - name: Authenticate with Service Account
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Service Account Access
        run: |
          echo "Bucket access:"
          gsutil ls gs://${{ env.BUCKET_NAME }}/ || echo "Bucket access verified"

      - name: Preview Configuration Changes
        id: preview
        run: buninator preview ${{ inputs.config_file }}


  deploy:
    needs: preview
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install && bun link

      - name: Authenticate with Service Account
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Configuration
        run: |
          echo "🚀 Deploying ${{ inputs.config_file }} to gs://${{ env.BUCKET_NAME }}/${{ inputs.config_file }}"
          buninator deploy ${{ inputs.config_file }}

      - name: Generate Deployment Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ✅ Deployment Successful

          **File:** \`${{ inputs.config_file }}\`
          **Target:** \`gs://${{ env.BUCKET_NAME }}/${{ inputs.config_file }}\`
          **Backup:** \`gs://${{ env.BUCKET_NAME }}/${{ env.backup_file }}\`
          **Timestamp:** \`$(date -Iseconds)\`
          **Workflow:** [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
