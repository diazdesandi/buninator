name: Generate Artifact
on:
  # pull_request_review:
  #   types: [submitted]
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    environment: test
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find JSON files
        id: find_json
        run: |
          echo "Using PR commit range:"
          echo "Base: ${{ github.event.pull_request.base.sha }}"
          echo "Head: ${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep '\.json$' || true)
          echo "Found JSON files: '$FILES'"
          echo "json_files=$FILES" >> $GITHUB_OUTPUT

      - name: Upload JSON artifacts
        if: steps.find_json.outputs.json_files != ''
        uses: actions/upload-artifact@v4
        with:
          name: "artifacts-${{ github.run_id }}"
          path: ${{ steps.find_json.outputs.json_files }}

      - name: Generate Artifact Summary
        if: steps.find_json.outputs.json_files != ''
        run: |
          echo "# PR JSON Artifact Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -Iseconds)" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Title:** ${{ github.event.pull_request.title }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
          echo "**Files:**" >> $GITHUB_STEP_SUMMARY
          for f in ${{ steps.find_json.outputs.json_files }}; do
            echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
          done

      - name: Comment artifact summary in PR
        if: steps.find_json.outputs.json_files != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            console.log(`Commenting on ${owner}/${repo} PR #${pr.number}`);
            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: pr.number,
              body: `📝 Artifact generated for this PR!\n\nSee details and download here: [Workflow Run](${runUrl})`
            });
